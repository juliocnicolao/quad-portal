name: IV Snapshot Daily

# Roda em dias uteis ~16:30 NY (20:30 UTC no verao / 21:30 UTC no inverno).
# Fixo em 21:15 UTC cobre inverno; no horario de verao fica ~17:15 NY
# (market close + 1h15min — suficiente pras chains estarem atualizadas).
on:
  schedule:
    - cron: '15 21 * * 1-5'
  workflow_dispatch:        # permite rodar manualmente via UI

permissions:
  contents: write           # necessario pra commitar data/iv_history.csv

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run snapshot
        run: python scripts/snapshot_iv.py

      - name: Commit CSV
        run: |
          git config user.name  "iv-snapshot-bot"
          git config user.email "iv-snapshot-bot@users.noreply.github.com"
          git add data/iv_history.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): iv snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
